
<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CRM 客户资源管理</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --pri:#2563eb;--pri-l:#3b82f6;--pri-d:#1d4ed8;--pri-bg:#eff6ff;
  --suc:#059669;--suc-bg:#ecfdf5;--war:#d97706;--war-bg:#fffbeb;
  --dan:#dc2626;--dan-bg:#fef2f2;--inf:#64748b;
  --bg:#f1f5f9;--card:#fff;--text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --brd:#e2e8f0;--r:12px;--r-lg:16px;--sh:0 1px 3px rgba(0,0,0,.06);--sh-lg:0 4px 16px rgba(0,0,0,.08);
  --fs-xs:11px;--fs-sm:13px;--fs-md:15px;--fs-lg:18px;--fs-xl:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

/* ===== HEADER ===== */
.header{position:sticky;top:0;z-index:100;background:var(--pri);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(37,99,235,.2)}
.header h1{font-size:16px;font-weight:700}
.header-right{display:flex;align-items:center;gap:6px}
.h-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative;transition:.15s}
.h-btn:active{transform:scale(.9);background:rgba(255,255,255,.2)}
.h-btn .b-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:#facc15;border-radius:50%;border:1.5px solid var(--pri);display:none}
.h-btn .b-dot.show{display:block}

/* ===== BOTTOM NAV ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--brd);display:flex;z-index:100;padding:4px 0 calc(4px + env(safe-area-inset-bottom));box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;cursor:pointer;color:var(--text3);border:none;background:none;font-family:inherit;transition:.15s}
.nav-item.active{color:var(--pri)}
.nav-item .ni{font-size:20px;line-height:1}
.nav-item .nl{font-size:10px;font-weight:500}

/* ===== SIDEBAR (desktop) ===== */
.sidebar{display:none;position:fixed;left:0;top:0;bottom:0;width:200px;background:linear-gradient(180deg,#1e3a5f 0%,#1a365d 100%);color:#fff;z-index:200;padding:20px 0;flex-direction:column}
.sidebar .logo{padding:0 20px 24px;font-size:18px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:12px;letter-spacing:.5px}
.sidebar .si{padding:12px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;border-left:3px solid transparent}
.sidebar .si:hover,.sidebar .si.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:#3b82f6}

/* ===== MAIN CONTENT ===== */
.main{padding:16px;padding-bottom:74px;max-width:860px;margin:0 auto}
.main.side{margin-left:200px}
.page{display:none;animation:in .25s ease}
.page.active{display:block}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== CARDS ===== */
.card{background:var(--card);border-radius:var(--r-lg);padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-head h3{font-size:var(--fs-md);font-weight:700}

/* ===== STATS ===== */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--pri);border-radius:0 2px 2px 0}
.stat.g::before{background:var(--suc)}
.stat.a::before{background:var(--war)}
.stat.r::before{background:var(--dan)}
.stat .sv{font-size:26px;font-weight:800;line-height:1.1}
.stat .sl{font-size:var(--fs-xs);color:var(--text2);margin-top:2px}

/* ===== PIPELINE ===== */
.pipeline{margin-bottom:14px}
.pl-row{display:flex;gap:6px}
.pl-stage{flex:1;background:var(--card);border-radius:var(--r);padding:10px 6px;text-align:center;box-shadow:var(--sh)}
.pl-stage .pl-n{font-size:20px;font-weight:800;line-height:1}
.pl-stage .pl-l{font-size:10px;color:var(--text2);margin-top:2px}
.pl-stage .pl-bar{height:3px;border-radius:2px;margin-top:6px}
.pl-s1 .pl-bar{background:var(--pri)}
.pl-s2 .pl-bar{background:var(--pri-l)}
.pl-s3 .pl-bar{background:var(--war)}
.pl-s4 .pl-bar{background:var(--dan)}

/* ===== SECTION TITLE ===== */
.sttl{font-size:var(--fs-lg);font-weight:700;margin:18px 0 10px;display:flex;align-items:center;justify-content:space-between}
.sttl .stc{font-size:var(--fs-xs);color:var(--text2);font-weight:400}

/* ===== FILTERS ===== */
.filters{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filters::-webkit-scrollbar{display:none}
.f-chip{padding:6px 14px;border-radius:20px;background:var(--card);border:1px solid var(--brd);font-size:var(--fs-sm);color:var(--text2);white-space:nowrap;cursor:pointer;font-family:inherit;transition:.15s}
.f-chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}

/* ===== SEARCH ===== */
.search{position:relative;margin-bottom:10px}
.search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--brd);border-radius:10px;font-size:var(--fs-sm);background:var(--card);font-family:inherit;outline:none}
.search input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3)}

/* ===== PROJECT CARDS ===== */
.pc{background:var(--card);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--sh);margin-bottom:10px;cursor:pointer;transition:.15s;border:1px solid transparent}
.pc:active{transform:scale(.98)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.pc-name{font-size:var(--fs-md);font-weight:700;flex:1;word-break:break-all}
.pc-status{font-size:var(--fs-xs);padding:2px 8px;border-radius:12px;font-weight:600;white-space:nowrap}
.st-即将完成{background:var(--suc-bg);color:var(--suc)}
.st-进行中{background:var(--pri-bg);color:var(--pri)}
.st-初期接触{background:var(--war-bg);color:var(--war)}
.st-待启动{background:var(--bg);color:var(--text2)}
.st-已流失{background:var(--dan-bg);color:var(--dan)}
.pc-meta{display:flex;gap:10px;font-size:var(--fs-xs);color:var(--text2);margin-bottom:8px;flex-wrap:wrap}
.pc-meta span{display:flex;align-items:center;gap:3px}
.pc-bar{height:5px;background:var(--brd);border-radius:3px;overflow:hidden;margin-bottom:6px}
.pc-bar-f{height:100%;border-radius:3px;transition:width .4s}
.pc-bar-f.hi{background:var(--suc)}.pc-bar-f.mi{background:var(--pri)}.pc-bar-f.lo{background:var(--text3)}
.pc-last{font-size:var(--fs-xs);color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.pc-last .pcd{color:var(--pri);font-weight:600;margin-right:4px}

/* Custom tags */
.tg-hi{color:var(--dan);font-weight:600}
.tg-mi{color:var(--war)}
.tg-lo{color:var(--suc)}
.tg-loss{color:var(--text3)}

/* ===== TIMELINE ===== */
.tl{position:relative;padding-left:28px}
.tl::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--brd)}
.tl .tl-item{position:relative;padding-bottom:14px}
.tl .tl-item:last-child{padding-bottom:0}
.tl .tl-dot{position:absolute;left:-28px;top:2px;width:18px;height:18px;border-radius:50%;border:3px solid var(--card);z-index:1}
.tl .tl-date{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.tl .tl-date .tld{font-size:var(--fs-xs);font-weight:700;color:var(--pri);background:var(--pri-bg);padding:2px 8px;border-radius:6px}
.tl .tl-date .tld.today{background:var(--pri);color:#fff}
.tl .tl-date .tld-old{background:var(--bg);color:var(--text3)}
.tl .tl-log{font-size:var(--fs-sm);color:var(--text);line-height:1.5;word-break:break-all}
.tl .tl-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px;font-weight:600;vertical-align:middle}

/* Date group header */
.tl-group-header{display:flex;align-items:center;gap:8px;margin:16px 0 12px -28px;position:relative}
.tl-group-header .tgh-date{font-size:var(--fs-md);font-weight:700;color:var(--text);background:var(--card);padding:4px 12px;border-radius:8px;z-index:1;box-shadow:var(--sh)}
.tl-group-header::after{content:'';flex:1;height:1px;background:var(--brd)}

/* ===== CLIENT CARDS ===== */
.cl-card{background:var(--card);border-radius:var(--r-lg);padding:16px;box-shadow:var(--sh);margin-bottom:10px;cursor:pointer;transition:.15s}
.cl-card:active{transform:scale(.98)}
.cl-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cl-name{font-size:var(--fs-md);font-weight:700;flex:1}
.cl-industry{font-size:var(--fs-xs);padding:2px 8px;border-radius:12px;background:var(--pri-bg);color:var(--pri);font-weight:600;white-space:nowrap}
.cl-info{font-size:var(--fs-xs);color:var(--text2);line-height:1.6;display:flex;flex-direction:column;gap:1px}
.cl-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--brd);font-size:var(--fs-xs);color:var(--text2)}
.cl-projects{display:flex;align-items:center;gap:4px}

/* ===== DETAIL PANEL (slide from right) ===== */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:none;justify-content:flex-end}
.panel-overlay.active{display:flex}
.panel{background:var(--bg);width:100%;max-width:480px;height:100%;overflow-y:auto;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.panel-header{position:sticky;top:0;z-index:10;background:var(--pri);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.panel-header h3{font-size:var(--fs-md);font-weight:700;flex:1}
.panel-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px;line-height:1}
.panel-body{padding:14px 16px 80px}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:350;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--card);width:100%;max-width:500px;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;animation:sUp .25s ease}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-h{padding:14px 18px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:1}
.m-h h3{font-size:var(--fs-md);font-weight:700}
.m-close{background:none;border:none;font-size:20px;color:var(--text2);cursor:pointer}
.m-b{padding:14px 18px}

/* ===== FORMS ===== */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:var(--fs-xs);font-weight:600;margin-bottom:4px;color:var(--text)}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1px solid var(--brd);border-radius:8px;font-size:var(--fs-sm);font-family:inherit;outline:none;background:var(--card);color:var(--text)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fg textarea{resize:vertical;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:var(--fs-sm);font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;width:100%}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--pri);color:#fff}
.btn-out{background:transparent;border:1.5px solid var(--brd);color:var(--text2)}
.btn-dan{background:var(--dan);color:#fff}
.btn-sm{width:auto;padding:6px 14px;font-size:var(--fs-xs)}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.9);color:#fff;padding:8px 18px;border-radius:20px;font-size:var(--fs-xs);z-index:400;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;bottom:90px}

/* ===== NOTIFICATION PANEL ===== */
.np{position:fixed;top:0;right:0;width:340px;max-width:90vw;background:var(--card);box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:350;border-radius:0 0 0 16px;transform:translateX(100%);transition:.25s;max-height:65vh;overflow-y:auto}
.np.show{transform:translateX(0)}
.np .nph{padding:14px 18px;background:var(--pri);color:#fff;display:flex;justify-content:space-between;align-items:center;border-radius:0 0 0 16px;font-size:var(--fs-sm);font-weight:700}
.np .npi{padding:12px 18px;border-bottom:1px solid var(--brd);display:flex;gap:8px;cursor:pointer;font-size:var(--fs-sm)}
.np .npi:hover{background:var(--bg)}
.np .npid{width:7px;height:7px;border-radius:50%;background:var(--dan);flex-shrink:0;margin-top:5px}
.np .npi.read .npid{background:var(--brd)}
.np .npib{flex:1;min-width:0}
.np .npit{font-weight:600;font-size:var(--fs-sm)}
.np .npid{font-size:var(--fs-xs);color:var(--text2);margin-top:2px}
.np .nptm{font-size:10px;color:var(--text3);margin-top:3px}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:32px 16px;color:var(--text3)}
.empty .ei{font-size:40px;opacity:.35;margin-bottom:6px}
.empty .et{font-size:var(--fs-sm)}

/* ===== ACTIVITY FEED ===== */
.feed-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd);cursor:pointer}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.feed-dot.f1{background:var(--pri)}.feed-dot.f2{background:var(--suc)}.feed-dot.f3{background:var(--war)}
.feed-body{flex:1;min-width:0}
.feed-title{font-size:var(--fs-sm);font-weight:600}
.feed-desc{font-size:var(--fs-xs);color:var(--text2);margin-top:2px;word-break:break-all}
.feed-time{font-size:10px;color:var(--text3);margin-top:2px}

/* ===== SUB TABS ===== */
.subtabs{display:flex;gap:4px;margin-bottom:10px;background:var(--card);border-radius:10px;padding:4px;box-shadow:var(--sh)}
.subtab{flex:1;text-align:center;padding:7px 0;border-radius:8px;font-size:var(--fs-sm);font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);font-family:inherit;transition:.15s}
.subtab.active{background:var(--pri);color:#fff}

/* ===== FAB ===== */
.fab{position:fixed;bottom:70px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--pri);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);z-index:90;display:flex;align-items:center;justify-content:center;transition:.15s}
.fab:active{transform:scale(.88)}

/* ===== RESPONSIVE ===== */
@media(min-width:768px){
  .sidebar{display:flex}.header{display:none}.bottom-nav{display:none}
  .main{padding:20px 24px;padding-bottom:24px}
  .stats{grid-template-columns:repeat(4,1fr)}
  .modal{border-radius:16px}.fab{bottom:28px;right:28px;width:52px;height:52px}
  .panel{max-width:520px}.fr{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:1024px){.main{max-width:960px}}

/* ===== SETTINGS ===== */
.settings-item{padding:14px 0;border-bottom:1px solid var(--brd)}
.settings-item:last-child{border-bottom:none}
.settings-item .si-label{font-size:13px;font-weight:600;margin-bottom:4px}
.settings-item .si-desc{font-size:12px;color:var(--text2);margin-bottom:8px}
.settings-item .si-row{display:flex;gap:8px;align-items:center}
.settings-item .si-row input{flex:1;padding:8px 12px;border:1px solid var(--brd);border-radius:8px;font-size:13px;font-family:monospace;outline:none}
.settings-item .si-row input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.si-status{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:12px}
.si-status.ok{background:#ecfdf5;color:#059669}
.si-status.no{background:#fef2f2;color:#dc2626}
/* Person multi-select */
.person-filter{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.person-chip{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid var(--brd);cursor:pointer;background:var(--card);color:var(--text2);white-space:nowrap;transition:.15s}
.person-chip.active{background:var(--pri-bg);color:var(--pri);border-color:var(--pri-l)}
.person-chip .pc-del{margin-left:3px;opacity:.5}
/* Dropdown filter */
.dd-filter{position:relative;display:inline-block}
.dd-trigger{padding:6px 12px;border:1px solid var(--brd);border-radius:8px;font-size:12px;cursor:pointer;background:var(--card);display:flex;align-items:center;gap:6px;white-space:nowrap}
.dd-trigger:after{content:'▾';font-size:9px;margin-left:2px}
.dd-menu{position:absolute;top:100%;left:0;margin-top:4px;background:var(--card);border:1px solid var(--brd);border-radius:8px;box-shadow:var(--sh-lg);z-index:50;min-width:150px;max-height:200px;overflow-y:auto;display:none}
.dd-menu.show{display:block}
.dd-menu .dd-item{padding:8px 12px;font-size:12px;cursor:pointer;white-space:nowrap}
.dd-menu .dd-item:hover{background:var(--pri-bg)}
.dd-menu .dd-item.active{color:var(--pri);font-weight:600}

</style></head><body>

<!-- Mobile Header -->
<header class="header">
  <h1>CRM 客户资源管理</h1>
  <div class="header-right">
    <button class="h-btn" onclick="openSettings()" title="设置">⚙️</button>
    <button class="h-btn" onclick="openChangesPanel()" title="变更记录">📋</button>
    <button class="h-btn" id="notifBtn" onclick="toggleNotif()">🔔<span class="b-dot" id="notifDot"></span></button>
  </div>
</header>

<div style="display:flex">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="logo">🔷 CRM 系统</div>
    <div class="si active" onclick="nav('dashboard')"><span style="font-size:18px">📊</span> 工作台</div>
    <div class="si" onclick="nav('projects')"><span style="font-size:18px">📋</span> 项目管理</div>
    <div class="si" onclick="nav('clients')"><span style="font-size:18px">👥</span> 客户管理</div>
    <div class="si" onclick="nav('resources')"><span style="font-size:18px">🏢</span> 资源库</div>
  </nav>

  <!-- Main Content -->
  <main class="main" id="mainArea">

    <!-- ===== DASHBOARD ===== -->
    <section class="page active" id="pg-dashboard">
      <div class="sttl">工作台概览 <span class="stc" id="dashDate"></span></div>
      <div class="stats" id="statsGrid"></div>
      <div class="sttl">项目Pipeline</div>
      <div class="pipeline" id="pipelineArea"></div>
      <div class="sttl" style="margin-top:6px">近30天跟进趋势</div>
      <div class="card"><div style="height:180px"><canvas id="chartTrend"></canvas></div></div>
      <div class="sttl">最近动态</div>
      <div class="card" id="recentFeed"></div>
      <div class="sttl">⚠️ 需要关注</div>
      <div class="card" id="attentionList"></div>
    </section>

    <!-- ===== PROJECTS ===== -->
    <section class="page" id="pg-projects">
      <div class="sttl">项目管理 <span class="stc" id="projCount"></span></div>
      <div class="subtabs" id="projSubTabs">
        <button class="subtab active" onclick="switchProjView('card')">📇 卡片视图</button>
        <button class="subtab" onclick="switchProjView('timeline')">📅 时间线</button>

function fixState(){
  if(!S.clients) S.clients = buildClientsFromProjects();
  if(!S.resources || !S.resources.length) S.resources = buildResources();
  if(!S.changes) S.changes = [];
  if(!S.notifs) S.notifs = [];
  // Ensure all projects have logs with ids
  S.projects.forEach(p=>{
    if(!p.logs) p.logs = [];
    p.logs.forEach(l=>{ if(!l.id) l.id = 'log_'+Date.now()+'_'+Math.random().toString(36).slice(2,8); });
  });
  // Fix dateSort for logs
  S.projects.forEach(p=>{
    p.logs.forEach(l=>{
      if(!l.dateSort) l.dateSort = parseDate(l.date||'');
    });
    p.logs.sort((a,b)=>b.dateSort.localeCompare(a.dateSort));
  });
  saveState();
}

function saveState(){ localStorage.setItem('crm_v2', JSON.stringify(S)); }

function parseDate(d){
  d = String(d).replace(/[日进展展]/g,'').replace(/col\d+/,'').trim();
  let parts = d.split('.');
  if(parts.length>=2){
    let m=parseInt(parts[0]), day=parseInt(parts[1]);
    if(m>=1&&m<=12&&day>=1&&day<=31) return '2026-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  }
  return '2026-01-01';
}

function renderTrendChart(){
  let ctx=document.getElementById('chartTrend'); if(!ctx) return;
  if(chartTrend) chartTrend.destroy();
  let today=new Date(), dates=[], counts=[];
  for(let i=29;i>=0;i--){
    let d=new Date(today); d.setDate(d.getDate()-i);
    let ds=d.toISOString().slice(0,10);
    dates.push((d.getMonth()+1)+'/'+d.getDate());
    let c=0; S.projects.forEach(p=>{ p.logs.forEach(l=>{ if(l.dateSort===ds) c++; }); });
    counts.push(c);
  }
  chartTrend = new Chart(ctx,{
    type:'line', data:{labels:dates,datasets:[{data:counts,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.08)',fill:true,tension:.4,pointRadius:0,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:9},maxRotation:45}},y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{font:{size:9},stepSize:1}}}}
  });
}

function renderTimelineView(){
  S.tlSearch = document.getElementById('tlSearch')?.value||'';
  
  // Build person filter chips
  let persons=new Set();
  S.projects.forEach(p=>p.logs.forEach(l=>{ if(l.person) persons.add(l.person); }));
  let chipsHtml='';
  persons.forEach(n=>{ chipsHtml+=`<span class="person-chip${S.personFilter===n?' active':''}" onclick="setPersonFilter('${esc(n)}')">${esc(n)}</span>`; });
  document.getElementById('personChips').innerHTML = chipsHtml;
  
  let all=[];
  S.projects.forEach(p=>{
    if(S.tlFilter!=='all' && p.id!==parseInt(S.tlFilter)) return;
    p.logs.forEach(l=>{
      if(S.personFilter!=='all' && l.person!==S.personFilter) return;
      let note=esc(l.note);
      if(S.tlSearch && !note.toLowerCase().includes(S.tlSearch.toLowerCase()) && !p.name.toLowerCase().includes(S.tlSearch.toLowerCase())) return;
      all.push({...l,projName:p.name,projId:p.id,status:p.status});
    });
  });
  all.sort((a,b)=>b.dateSort.localeCompare(a.dateSort));

  let today=new Date().toISOString().slice(0,10);
  let groups={};
  all.forEach(l=>{
    let key=l.dateSort;
    if(!groups[key]) groups[key]=[];
    groups[key].push(l);
  });

  let html='';
  let sortedKeys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  sortedKeys.forEach(key=>{
    let items=groups[key];
    let dateLabel=items[0].date;
    let dateCls='tld';
    if(key===today) dateCls='tld today';
    else if(key<'2026-06-01') dateCls='tld tld-old';

      <div class="tl-item">

  if(!html) html='<div class="empty"><div class="ei">📅</div><div class="et">没有匹配的跟进记录</div></div>';

function buildTimeline(logs){
  return '<div class="tl">'+logs.map(l=>{
    let dotClass='';
    if(l.note.includes('放弃')||l.note.includes('流失')) dotClass=' style="background:#dc2626"';
    else if(l.note.includes('延期')||l.note.includes('等待')) dotClass=' style="background:#d97706"';
    else if(l.dateSort>'2026-06-20') dotClass=' style="background:#059669"';
    return `<div class="tl-item"><div class="tl-dot"${dotClass}></div><div class="tl-date"><span class="tld">${l.date}</span>${l.person?` · <span style="color:var(--pri);font-weight:600;font-size:11px">${esc(l.person)}</span>`:''}</div><div class="tl-log">${esc(l.note)}</div></div>`;

function quickAddLog(pid){

  p.logs.unshift({id:'log_'+Date.now(),date:ds,dateSort:dsort,note:inp.value.trim(),person:person,timestamp:now.toISOString()});

// Project Modal
function openProjModal(id){
  document.getElementById('fProjId').value = id||'';
  document.getElementById('mProjTitle').textContent = id?'编辑项目':'新增项目';
  if(id){ let p=S.projects.find(x=>x.id===id); if(!p) return;
    document.getElementById('fProjName').value=p.name;
    document.getElementById('fProjPri').value=p.priority;
    document.getElementById('fProjComp').value=p.completionNum;
    document.getElementById('fProjClient').value=p.customer||'';
    document.getElementById('fProjIndustry').value=p.industry||'';
    document.getElementById('fProjAmt').value=p.amount||0;
  }else{
    document.getElementById('fProjName').value='';
    document.getElementById('fProjPri').value='高';
    document.getElementById('fProjComp').value=0;
    document.getElementById('fProjClient').value='';
    document.getElementById('fProjIndustry').value='';
    document.getElementById('fProjAmt').value='';
  }
  document.getElementById('mProj').classList.add('active');
}

function saveProject(){
  let name=document.getElementById('fProjName').value.trim(); if(!name){ showToast('请输入项目名称'); return; }
  let id=document.getElementById('fProjId').value;
  let priority=document.getElementById('fProjPri').value;
  let comp=parseFloat(document.getElementById('fProjComp').value)||0;
  let customer=document.getElementById('fProjClient').value.trim();
  let industry=document.getElementById('fProjIndustry').value.trim();
  let amount=parseFloat(document.getElementById('fProjAmt').value)||0;

  let status; if(priority==='战败') status='已流失'; else if(comp>=.9) status='即将完成'; else if(comp>=.5) status='进行中'; else if(comp>0) status='初期接触'; else status='待启动';

  if(id){
    let p=S.projects.find(x=>x.id===parseInt(id)); if(!p) return;
    Object.assign(p,{name,priority,completionNum:comp,completion:String(comp),status,customer,industry,amount});
    addChange('update',`更新项目 - ${name}`, `状态:${status}, 完成度:${Math.round(comp*100)}%`);
  }else{
    let nid=Math.max(0,...S.projects.map(x=>x.id))+1;
    S.projects.push({id:nid,name,priority,completion:String(comp),completionNum:comp,status,customer,industry,amount,createdAt:new Date().toISOString(),logs:[]});
    addChange('create',`新增项目 - ${name}`, `优先级:${priority}`);
    // Auto-add client
    if(customer && !S.clients.find(x=>x.name===customer)){
      S.clients.push({id:'c'+Date.now(),name:customer,industry,status:'活跃',contact:'',phone:'',address:'',note:'',projIds:[nid],createdAt:new Date().toISOString()});
    }else if(customer){ let c=S.clients.find(x=>x.name===customer); if(c&&!c.projIds.includes(nid)) c.projIds.push(nid); }
  }
  saveState(); closeModal('mProj'); renderProjCards(); showToast(id?'已更新 ✓':'已创建 ✓');
}

// Log Modal
function openLogModal(pid){
  document.getElementById('fLogPid').value=pid;
  document.getElementById('fLogContent').value='';
  document.getElementById('fLogDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('fLogPerson').value=S.defaultPerson||'';
  updatePersonDatalist();
  document.getElementById('mLog').classList.add('active');
}

function saveLog(){
  let content=document.getElementById('fLogContent').value.trim(); if(!content){ showToast('请输入跟进内容'); return; }
  let pid=parseInt(document.getElementById('fLogPid').value);
  let p=S.projects.find(x=>x.id===pid); if(!p) return;
  let dateVal=document.getElementById('fLogDate').value;
  let person=document.getElementById('fLogPerson').value.trim();
  let d=new Date(dateVal), ds=(d.getMonth()+1)+'.'+d.getDate(), dsort=dateVal;
  p.logs.unshift({id:'log_'+Date.now(),date:ds,dateSort:dsort,note:content,person:person,timestamp:new Date().toISOString()});
  p.logs.sort((a,b)=>b.dateSort.localeCompare(a.dateSort));
  if(person){ S.defaultPerson=person; saveState(); }
  addChange('log',`跟进记录 - ${p.name}`, content.slice(0,50));
  saveState(); closeModal('mLog');
  if(document.getElementById('projPanel').classList.contains('active')) openProjPanel(pid);
  showToast('已添加 ✓');
  pushToWechat(`项目跟进: ${p.name}`, `${person||'有人'}添加了跟进记录`, content.slice(0,80));
}

function deleteProject(id){
  let p=S.projects.find(x=>x.id===id); if(!p) return;
  if(!confirm(`确定删除"${p.name}"及其${p.logs.length}条记录吗？`)) return;
  S.projects=S.projects.filter(x=>x.id!==id);
  addChange('delete',`删除项目 - ${p.name}`, `${p.logs.length}条记录`);
  saveState(); closePanel('projPanel'); renderProjCards(); showToast('已删除');
}

function saveClient(){
  let name=document.getElementById('fClientName').value.trim(); if(!name){ showToast('请输入客户名称'); return; }
  let cid=document.getElementById('fClientId').value;
  let data={name,industry:document.getElementById('fClientIndustry').value.trim(),status:document.getElementById('fClientStatus').value,
    contact:document.getElementById('fClientContact').value.trim(),phone:document.getElementById('fClientPhone').value.trim(),
    address:document.getElementById('fClientAddr').value.trim(),note:document.getElementById('fClientNote').value.trim()};
  if(cid){
    let c=S.clients.find(x=>x.id===cid); if(!c) return;
    Object.assign(c,data);
    addChange('update',`更新客户 - ${name}`, `状态:${data.status}`);
  }else{
    S.clients.push({...data, id:'c'+Date.now(), projIds:[], createdAt:new Date().toISOString()});
    addChange('create',`新增客户 - ${name}`, `行业:${data.industry}`);
  }
  saveState(); closeModal('mClient'); renderClients(); showToast(cid?'已更新 ✓':'已添加 ✓');
}

function deleteClient(cid){
  let c=S.clients.find(x=>x.id===cid); if(!c) return;
  if(!confirm(`确定删除客户"${c.name}"吗？关联项目不受影响。`)) return;

  addChange('delete',`删除客户 - ${c.name}`, '');
  saveState(); closePanel('clientPanel'); renderClients(); showToast('已删除');
}

// ===== CHANGES =====
function addChange(type,title,desc){ S.changes.push({type,title,desc,time:new Date().toISOString()}); saveState(); }

function openChangesPanel(){
  let panel=document.getElementById('changesPanel');
  let list=document.getElementById('changesList');
  let sorted=[...S.changes].sort((a,b)=>b.time.localeCompare(a.time));
  let icons={create:'🌱',update:'✏️',log:'📝',delete:'🗑️'};
  list.innerHTML = sorted.length?sorted.map(c=>`
    <div class="npi"><div class="npid" style="background:${({create:'#059669',update:'#2563eb',log:'#d97706',delete:'#dc2626'})[c.type]}"></div><div class="npib">
      <div class="npit">${icons[c.type]||'📝'} ${esc(c.title)}</div>
      ${c.desc?`<div class="npid">${esc(c.desc)}</div>`:''}
      <div class="nptm">${fmtTime(c.time)}</div>
    </div></div>`).join(''):'<div class="empty"><div class="ei">📝</div><div class="et">暂无记录</div></div>';
  panel.classList.add('show');

// ===== NOTIFICATIONS =====
function checkReminders(){
  let today=new Date().toISOString().slice(0,10), newN=[];
  S.projects.forEach(p=>{
    if(p.status==='已流失') return;
    let ll=p.logs[0];
    if(ll&&ll.dateSort){ let days=Math.floor((new Date(today)-new Date(ll.dateSort))/86400000);
      if(days>=7){ newN.push({id:'stale_'+p.id,type:'reminder',projId:p.id,title:`${p.name} - ${days}天未跟进`,desc:ll.note.slice(0,40),time:new Date().toISOString(),read:false}); }
    }
    if(p.priority==='高'&&p.completionNum<0.3){ newN.push({id:'prio_'+p.id,type:'priority',projId:p.id,title:`${p.name} - 高优先级低完成度`,desc:`完成度${Math.round(p.completionNum*100)}%，需关注`,time:new Date().toISOString(),read:false}); }
  });
  let hasNew=false;
  newN.forEach(n=>{ if(!S.notifs.find(x=>x.id===n.id)){ S.notifs.unshift(n); hasNew=true; } });
  if(hasNew){ saveState(); updateNotifBadge(); }
}

function updateNotifBadge(){
  let unread=S.notifs.filter(n=>!n.read).length;
  let dot=document.getElementById('notifDot'); if(dot) dot.classList.toggle('show',unread>0);
}

function toggleNotif(){
  let p=document.getElementById('notifPanel');
  if(p.classList.contains('show')){ p.classList.remove('show'); return; }
  p.classList.add('show');
  let list=document.getElementById('notifList');
  let sorted=[...S.notifs].sort((a,b)=>b.time.localeCompare(a.time));
  let icons={reminder:'⏰',priority:'🔴',log:'📝'};
  list.innerHTML = sorted.length?sorted.map(n=>`
    <div class="npi ${n.read?'read':''}" onclick="handleNotif('${n.id}')">
      <div class="npid"></div><div class="npib">
        <div class="npit">${icons[n.type]||'🔔'} ${esc(n.title)}</div>
        ${n.desc?`<div class="npid">${esc(n.desc)}</div>`:''}
        <div class="nptm">${fmtTime(n.time)}</div>
      </div></div>`).join(''):'<div class="empty"><div class="ei">🔔</div><div class="et">暂无提醒</div></div>';
}

function handleNotif(nid){
  let n=S.notifs.find(x=>x.id===nid); if(!n) return;
  n.read=true; saveState(); updateNotifBadge();
  document.getElementById('notifPanel').classList.remove('show');
  if(n.projId) openProjPanel(n.projId);
}

// ===== WECHAT PUSH =====
function pushToWechat(title, subtitle, content){
  if(!S.pushKey) return;
  let payload = {
    token: S.pushKey,
    title: title,
    content: `<div style="font-size:14px"><h3>${title}</h3><p style="color:#666">${subtitle}</p><p>${content}</p><p style="color:#999;font-size:12px">${new Date().toLocaleString('zh-CN')} · CRM系统</p></div>`,
    template: 'html'
  };
  try{
    fetch('https://www.pushplus.plus/send', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    }).catch(()=>{});
  }catch(e){}
}

function testPush(){
  // 先读取输入框中的 Token（用户可能刚粘贴还没保存）
  let inputKey = document.getElementById('sPushKey').value.trim();
  if(inputKey) { S.pushKey = inputKey; saveState(); }
  if(!S.pushKey){ showToast('请先配置 PushPlus Token'); return; }
  let statusEl=document.getElementById('pushStatus');
  statusEl.innerHTML = '<span class="si-status" style="background:#fef3c7;color:#92400e">⏳ 发送中...</span>';
  
  fetch('https://www.pushplus.plus/send', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      token: S.pushKey,
      title: 'CRM系统 · 推送测试',
      content: '<div style="font-size:14px"><h3>✅ 推送测试成功</h3><p style="color:#666">你的CRM系统已成功连接微信推送</p><p style="color:#999;font-size:12px">' + new Date().toLocaleString('zh-CN') + '</p></div>',
      template: 'html'
    })
  }).then(r=>r.json()).then(data=>{
    if(data.code===200){
      statusEl.innerHTML = '<span class="si-status ok">✅ 推送成功！请查看微信</span>';
      S.pushEnabled=true; saveState();
    }else{
      statusEl.innerHTML = '<span class="si-status no">❌ 推送失败：'+(data.msg||'请检查Token')+'</span>';
      S.pushEnabled=false; saveState();
    }
  }).catch(()=>{
    statusEl.innerHTML = '<span class="si-status no">❌ 网络错误，请重试</span>';
  });
}

function openSettings(){
  document.getElementById('sPushKey').value=S.pushKey||'';
  document.getElementById('sDefaultPerson').value=S.defaultPerson||'';
  let statusEl=document.getElementById('pushStatus');
  if(S.pushKey&&S.pushEnabled){ statusEl.innerHTML='<span class="si-status ok">✅ 已连接</span>'; }
  else if(S.pushKey){ statusEl.innerHTML='<span class="si-status" style="background:#fef3c7;color:#92400e">⚠️ 未验证，点测试确认</span>'; }
  else{ statusEl.innerHTML='<span class="si-status no">❌ 未配置</span>'; }
  document.getElementById('mSettings').classList.add('active');
}

function saveSettings(){
  let pushKey=document.getElementById('sPushKey').value.trim();
  let defaultPerson=document.getElementById('sDefaultPerson').value.trim();
  S.pushKey=pushKey; S.defaultPerson=defaultPerson;
  saveState();
  if(!pushKey){ S.pushEnabled=false; document.getElementById('pushStatus').innerHTML='<span class="si-status no">❌ 未配置</span>'; }
  updatePersonDatalist();
  closeModal('mSettings');
  showToast('设置已保存 ✓');
}

function updatePersonDatalist(){
  let persons=new Set();
  S.projects.forEach(p=>p.logs.forEach(l=>{ if(l.person) persons.add(l.person); }));
  if(S.defaultPerson) persons.add(S.defaultPerson);
  let dl=document.getElementById('personList');
  if(dl) dl.innerHTML = [...persons].map(n=>`<option value="${esc(n)}">`).join('');
}

function exportData(){
  let blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  let a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='crm_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); showToast('数据已导出 ✓');
}

function importData(e){
  let file=e.target.files[0]; if(!file) return;
  let reader=new FileReader();
  reader.onload=function(ev){
    try{
      let data=JSON.parse(ev.target.result);
      if(!data.projects){ showToast('无效的数据文件'); return; }
      if(!confirm('导入将覆盖当前所有数据，确定继续？')) return;
      Object.assign(S,data);
      saveState(); fixState();
      renderDashboard(); renderProjCards(); renderClients(); renderResources();
      showToast('数据已导入 ✓');
    }catch(ex){ showToast('文件格式错误'); }
  };
  reader.readAsText(file);
}

function resetData(){
  if(!confirm('确定重置所有数据吗？此操作不可撤销！建议先导出备份。')) return;
  localStorage.removeItem('crm_v2');
  S={projects:[],partners:[],clients:[],resources:[],changes:[],notifs:[],
    projFilter:'all',projView:'card',tlFilter:'all',clientFilter:'all',resFilter:'all',personFilter:'all',
    projSearch:'',tlSearch:'',clientSearch:'',resSearch:'',pushKey:'',defaultPerson:'',pushEnabled:false};
  loadSeed();
  fixState();
  renderDashboard(); renderProjCards(); renderClients(); renderResources();
  showToast('数据已重置 ✓');
}

// ===== UTILS =====
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtTime(iso){
  if(!iso) return ''; let d=new Date(iso), now=new Date(), diff=(now-d)/1000;
  if(diff<60) return '刚刚'; if(diff<3600) return Math.floor(diff/60)+'m前';
  if(diff<86400) return Math.floor(diff/3600)+'h前'; if(diff<604800) return Math.floor(diff/86400)+'天前';
  return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
}
function showToast(msg){ let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200); }

// Overlay click to close
document.querySelectorAll('.panel-overlay,.modal-overlay').forEach(o=>{ o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('active'); }); });

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ document.querySelectorAll('.panel-overlay.active,.modal-overlay.active').forEach(o=>o.classList.remove('active')); } });
